name: Build Base APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Using the official Gradle action instead of the local wrapper
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6' # Bumped up to satisfy AGP requirements

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      # Upload as a standard GitHub Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: base-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # Your custom script to auto-commit/push the APK back to the repository
      - name: Auto-commit APK to Git
        run: |
          curl -s https://raw.githubusercontent.com/juancolchete/utils/main/gitUpload.sh | bash /dev/stdin ${{ vars.GIT_UPLOAD_PARAMS }} "bot: ${{ github.workflow }}"
          
