name: Build Base APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab

# Force GitHub Actions to use the upcoming Node.js 24 environment
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # Using the official Gradle action instead of the local wrapper
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6' # Bumped up to satisfy AGP requirements

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      # Upload as a standard GitHub Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v5
        with:
          name: base-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # Your custom script to auto-commit/push the APK back to the repository
      - name: Auto-commit APK to Git
        run: |
          # Rename the APK dynamically to match the repository name
          mv app/build/outputs/apk/debug/app-debug.apk ${{ github.event.repository.name }}.apk
          
          # Clean up build artifacts to prevent repository bloat
          rm -rf app/build
          rm -rf .gradle
          
          # Upload via your custom script
          curl -s https://raw.githubusercontent.com/juancolchete/utils/main/gitUpload.sh | bash /dev/stdin ${{ vars.GIT_UPLOAD_PARAMS }} "bot: ${{ github.workflow }}"
